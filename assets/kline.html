<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>trade-core · K线</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #30363d;
    --text: #e6edf3; --dim: #8b949e;
    --up: #26a69a; --down: #ef5350; --accent: #58a6ff;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text);
         font: 14px/1.4 -apple-system, "Segoe UI", Roboto, sans-serif; }
  header { display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
           padding: 10px 14px; background: var(--panel);
           border-bottom: 1px solid var(--border); }
  header h1 { font-size: 15px; font-weight: 600; margin-right: 6px; }
  select { background: var(--bg); color: var(--text); border: 1px solid var(--border);
           border-radius: 6px; padding: 4px 8px; font-size: 13px; }
  .iv { display: flex; gap: 2px; flex-wrap: wrap; }
  .iv button { background: transparent; color: var(--dim); border: none;
               border-radius: 6px; padding: 4px 9px; font-size: 13px; cursor: pointer; }
  .iv button:hover { background: var(--border); color: var(--text); }
  .iv button.on { background: var(--accent); color: #0d1117; font-weight: 600; }
  #last { margin-left: auto; font-size: 18px; font-weight: 700;
          font-variant-numeric: tabular-nums; }
  #last.up { color: var(--up); } #last.down { color: var(--down); }
  #meta { color: var(--dim); font-size: 12px; }
  #wrap { padding: 10px 14px; }
  canvas { width: 100%; height: calc(100vh - 110px); display: block;
           background: var(--panel); border: 1px solid var(--border);
           border-radius: 8px; }
</style>
</head>
<body>
<header>
  <h1>trade-core K线</h1>
  <select id="sym"></select>
  <div class="iv" id="iv"></div>
  <span id="last">–</span>
  <span id="meta"></span>
</header>
<div id="wrap"><canvas id="cv"></canvas></div>
<script>
"use strict";
const INTERVALS = [["1s","1秒"],["1m","1分"],["3m","3分"],["5m","5分"],["10m","10分"],
                   ["15m","15分"],["30m","30分"],["1d","日"],["1w","周"],["1mo","月"]];
let interval = "1s", symbol = null, candles = [], prevClose = null;

const ivBox = document.getElementById("iv");
for (const [key, label] of INTERVALS) {
  const b = document.createElement("button");
  b.textContent = label; b.dataset.k = key;
  if (key === interval) b.classList.add("on");
  b.onclick = () => { interval = key;
    ivBox.querySelectorAll("button").forEach(x => x.classList.toggle("on", x.dataset.k === key));
    refresh(); };
  ivBox.appendChild(b);
}
const symSel = document.getElementById("sym");
symSel.onchange = () => { symbol = symSel.value; refresh(); };

async function loadSymbols() {
  try {
    const syms = await (await fetch("/api/symbols")).json();
    if (!syms.length) return;
    const cur = symbol;
    symSel.innerHTML = syms.map(s => `<option value="${s}">品种 ${s}</option>`).join("");
    if (cur && syms.includes(+cur)) symSel.value = cur;
    symbol = symSel.value;
  } catch (e) {}
}

async function refresh() {
  if (symbol == null) { await loadSymbols(); if (symbol == null) return; }
  try {
    const r = await fetch(`/api/candles?symbol=${symbol}&interval=${interval}&limit=120`);
    candles = await r.json();
    draw();
  } catch (e) {}
}

function fmtTime(t) {
  const d = new Date(t * 1000);
  if (interval === "1d" || interval === "1w")
    return `${d.getMonth() + 1}/${d.getDate()}`;
  if (interval === "1mo")
    return `${d.getFullYear()}/${d.getMonth() + 1}`;
  const hh = String(d.getHours()).padStart(2, "0");
  const mm = String(d.getMinutes()).padStart(2, "0");
  if (interval === "1s") return `${hh}:${mm}:${String(d.getSeconds()).padStart(2, "0")}`;
  return `${hh}:${mm}`;
}

const cv = document.getElementById("cv"), ctx = cv.getContext("2d");
function draw() {
  const dpr = window.devicePixelRatio || 1;
  const W = cv.clientWidth, H = cv.clientHeight;
  cv.width = W * dpr; cv.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);
  const css = getComputedStyle(document.documentElement);
  const UP = css.getPropertyValue("--up").trim(), DOWN = css.getPropertyValue("--down").trim();
  const DIM = css.getPropertyValue("--dim").trim(), BORDER = css.getPropertyValue("--border").trim();

  if (!candles.length) {
    ctx.fillStyle = DIM; ctx.font = "14px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("等待成交数据…", W / 2, H / 2);
    return;
  }

  const padL = 8, padR = 64, padT = 12, axisH = 24;
  const volH = Math.floor(H * 0.18);
  const priceH = H - padT - axisH - volH - 8;
  const n = candles.length;
  const slot = (W - padL - padR) / n, bw = Math.max(1, Math.min(slot * 0.65, 21));

  let lo = Infinity, hi = -Infinity, maxV = 1;
  for (const c of candles) { lo = Math.min(lo, c[3]); hi = Math.max(hi, c[2]); maxV = Math.max(maxV, c[5]); }
  if (hi === lo) { hi += 1; lo -= 1; }
  const y = p => padT + priceH * (1 - (p - lo) / (hi - lo));

  // price gridlines + right axis labels
  ctx.font = "11px sans-serif"; ctx.textAlign = "left"; ctx.textBaseline = "middle";
  const steps = 5;
  for (let i = 0; i <= steps; i++) {
    const p = lo + (hi - lo) * i / steps, yy = y(p);
    ctx.strokeStyle = BORDER; ctx.globalAlpha = 0.5;
    ctx.beginPath(); ctx.moveTo(padL, yy); ctx.lineTo(W - padR, yy); ctx.stroke();
    ctx.globalAlpha = 1; ctx.fillStyle = DIM;
    ctx.fillText(p.toFixed(0), W - padR + 6, yy);
  }

  // candles + volume
  const volY0 = padT + priceH + 8;
  for (let i = 0; i < n; i++) {
    const [t, o, h, l, c, v] = candles[i];
    const x = padL + slot * i + slot / 2;
    const up = c >= o;
    ctx.strokeStyle = ctx.fillStyle = up ? UP : DOWN;
    // wick
    ctx.beginPath(); ctx.moveTo(x, y(h)); ctx.lineTo(x, y(l)); ctx.stroke();
    // body
    const yo = y(o), yc = y(c);
    ctx.fillRect(x - bw / 2, Math.min(yo, yc), bw, Math.max(1, Math.abs(yc - yo)));
    // volume bar
    ctx.globalAlpha = 0.55;
    const vh = volH * (v / maxV);
    ctx.fillRect(x - bw / 2, volY0 + volH - vh, bw, vh);
    ctx.globalAlpha = 1;
  }

  // time axis: ~8 labels
  ctx.fillStyle = DIM; ctx.textAlign = "center"; ctx.textBaseline = "top";
  const step = Math.max(1, Math.floor(n / 8));
  for (let i = 0; i < n; i += step) {
    const x = padL + slot * i + slot / 2;
    ctx.fillText(fmtTime(candles[i][0]), x, H - axisH + 6);
  }

  // last price line + header readout
  const lastC = candles[n - 1][4];
  ctx.strokeStyle = ctx.fillStyle = lastC >= candles[n - 1][1] ? UP : DOWN;
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(padL, y(lastC)); ctx.lineTo(W - padR, y(lastC)); ctx.stroke();
  ctx.setLineDash([]);
  ctx.textAlign = "left"; ctx.textBaseline = "middle";
  ctx.fillText(String(lastC), W - padR + 6, Math.max(10, y(lastC)) );

  const lastEl = document.getElementById("last");
  lastEl.textContent = lastC;
  if (prevClose != null) lastEl.className = lastC >= prevClose ? "up" : "down";
  prevClose = lastC;
  const c0 = candles[n - 1];
  document.getElementById("meta").textContent =
    `开 ${c0[1]}  高 ${c0[2]}  低 ${c0[3]}  收 ${c0[4]}  量 ${c0[5]}`;
}

window.addEventListener("resize", draw);
loadSymbols().then(refresh);
setInterval(refresh, 1000);
setInterval(loadSymbols, 10000);
</script>
</body>
</html>
