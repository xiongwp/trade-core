# One-click deployment of the three separately deployed services:
#
#   trade-core   — the matching node (orders :9001, market-data fanout :9101)
#   market-data  — K-lines + depth ladder + chart UI/WS    http://localhost:8080
#   order        — the order system (demo flow generator; swap in your real
#                  order system — it speaks the same 40-byte TCP protocol)
#
#   docker compose up --build
#   open http://localhost:8080     # candlesticks + depth, WebSocket push

services:
  trade-core:
    build: .
    image: trade-core-node
    ports:
      - "9001:9001"   # order-system connection
      - "9101:9101"   # market-data fanout
    environment:
      SHARDS: "4"
      POOL_MB: "1024"       # raise to 3072 in prod
      BAND_BPS: "1000"      # anti-spike band ±10%
    volumes:
      - trade-core-journal:/data/journal
    restart: unless-stopped

  market-data:
    image: trade-core-node
    depends_on:
      - trade-core
    command: ["exec market-data trade-core:9101 0.0.0.0:8080 /data/md"]
    ports:
      - "8080:8080"   # chart UI + JSON API + WebSocket
    volumes:
      - market-data-history:/data/md
    restart: unless-stopped

  order:
    image: trade-core-node
    depends_on:
      - trade-core
    command: ["exec order trade-core:9001 300"]
    restart: unless-stopped

volumes:
  trade-core-journal:
  market-data-history:
