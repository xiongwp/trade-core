# One-click deployment of the separated services:
#
#   matching     — the matching-engine node (orders :9001, market-data :9101)
#   market-data  — K-line aggregation + chart UI      http://localhost:8080
#   sim-trader   — a stand-in order system generating live flow
#
#   docker compose up --build
#   open http://localhost:8080        # candlestick chart (1s…1mo intervals)
#
# In production, replace sim-trader with your real order system (it speaks the
# same 40-byte TCP protocol) and scale matching nodes horizontally — one
# instrument set per node, routed by cluster::ClusterMap.

services:
  matching:
    build: .
    image: trade-core-node
    ports:
      - "9001:9001"   # order system connection
      - "9101:9101"   # market-data fanout
    environment:
      SHARDS: "4"
      POOL_MB: "1024"       # raise to 3072 in prod
      BAND_BPS: "1000"      # anti-spike band ±10%
    volumes:
      - matching-journal:/data/journal
    restart: unless-stopped

  market-data:
    image: trade-core-node
    depends_on:
      - matching
    command: ["exec market_data matching:9101 0.0.0.0:8080"]
    ports:
      - "8080:8080"   # chart UI + JSON API
    restart: unless-stopped

  sim-trader:
    image: trade-core-node
    depends_on:
      - matching
    command: ["exec sim_trader matching:9001 300"]
    restart: unless-stopped

volumes:
  matching-journal:
