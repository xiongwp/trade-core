# One-click local deployment. The included file starts five durable Raft
# members as well; their order endpoints are published on 9301..9305 and
# metrics on 9201..9205.
include:
  - path: docker-compose.raft.yml

x-mysql-command: &mysql-command
  - --innodb-buffer-pool-size=${TC_MYSQL_BUFFER_POOL_SIZE:-64M}
  - --innodb-log-buffer-size=${TC_MYSQL_LOG_BUFFER_SIZE:-16M}
  - --innodb-redo-log-capacity=${TC_MYSQL_REDO_CAPACITY:-256M}
  - --innodb-flush-log-at-trx-commit=1
  - --performance-schema=OFF
  - --max-connections=${TC_MYSQL_MAX_CONNECTIONS:-100}

#   market-data  — K-lines + depth ladder + chart UI/WS    http://localhost:8081
#   order        — persistent order API (10 MySQL databases x 100 tables)
#   raft-1..5    — durable matching cluster and market-data fanout
#
#   docker compose up --build
#   open http://localhost:8081     # candlesticks + depth, WebSocket push

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v26.1.12
    command:
      - redpanda
      - start
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --rpc-addr=redpanda:33145
      - --advertise-rpc-addr=redpanda:33145
      - --mode=dev-container
      - --smp=${TC_KAFKA_SMP:-1}
      - --memory=${TC_KAFKA_MEMORY:-384M}
      - --default-log-level=warn
    ports:
      - "19092:19092"
      - "19644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info", "--brokers=127.0.0.1:9092"]
      interval: 3s
      timeout: 3s
      retries: 40
      start_period: 10s
    restart: unless-stopped

  redpanda-2:
    image: docker.redpanda.com/redpandadata/redpanda:v26.1.12
    command:
      - redpanda
      - start
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19093
      - --advertise-kafka-addr=internal://redpanda-2:9092,external://localhost:19093
      - --rpc-addr=redpanda-2:33145
      - --advertise-rpc-addr=redpanda-2:33145
      - --seeds=redpanda:33145
      - --mode=dev-container
      - --smp=${TC_KAFKA_SMP:-1}
      - --memory=${TC_KAFKA_MEMORY:-384M}
      - --default-log-level=warn
    ports: ["19093:19093", "19645:9644"]
    volumes: ["redpanda-2-data:/var/lib/redpanda/data"]
    healthcheck: { test: ["CMD", "rpk", "cluster", "info", "--brokers=127.0.0.1:9092"], interval: 3s, timeout: 3s, retries: 40, start_period: 10s }
    restart: unless-stopped

  redpanda-3:
    image: docker.redpanda.com/redpandadata/redpanda:v26.1.12
    command:
      - redpanda
      - start
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19094
      - --advertise-kafka-addr=internal://redpanda-3:9092,external://localhost:19094
      - --rpc-addr=redpanda-3:33145
      - --advertise-rpc-addr=redpanda-3:33145
      - --seeds=redpanda:33145
      - --mode=dev-container
      - --smp=${TC_KAFKA_SMP:-1}
      - --memory=${TC_KAFKA_MEMORY:-384M}
      - --default-log-level=warn
    ports: ["19094:19094", "19646:9644"]
    volumes: ["redpanda-3-data:/var/lib/redpanda/data"]
    healthcheck: { test: ["CMD", "rpk", "cluster", "info", "--brokers=127.0.0.1:9092"], interval: 3s, timeout: 3s, retries: 40, start_period: 10s }
    restart: unless-stopped

  redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda:v26.1.12
    depends_on:
      redpanda:
        condition: service_healthy
      redpanda-2:
        condition: service_healthy
      redpanda-3:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        i=0
        while [ "$$i" -lt "${TC_ORDER_KAFKA_TOPIC_COUNT:-4}" ]; do
          rpk topic create --if-not-exists --brokers=redpanda:9092 \
            --partitions=${TC_ORDER_KAFKA_PARTITIONS_PER_TOPIC:-8} --replicas=3 \
            "orders-v2-g$$i"
          i=$$((i + 1))
        done
        rpk topic create --if-not-exists --brokers=redpanda:9092 \
          --partitions=${TC_EXECUTION_KAFKA_PARTITIONS:-16} --replicas=3 \
          "${TC_EXECUTION_KAFKA_TOPIC:-trade-executions-v1}"
        rpk topic create --if-not-exists --brokers=redpanda:9092 \
          --partitions=${TC_EXECUTION_CURSOR_PARTITIONS:-16} --replicas=3 \
          --topic-config cleanup.policy=compact \
          "${TC_EXECUTION_CURSOR_TOPIC:-trade-execution-outbox-cursors-v1}"
    restart: "no"

  market-data:
    image: trade-core-node
    command: ["exec market-data raft-1:9101,raft-2:9101,raft-3:9101,raft-4:9101,raft-5:9101,raft-1:9111,raft-2:9111,raft-3:9111,raft-4:9111,raft-5:9111,raft-1:9121,raft-2:9121,raft-3:9121,raft-4:9121,raft-5:9121,raft-1:9131,raft-2:9131,raft-3:9131,raft-4:9131,raft-5:9131 0.0.0.0:8080 /data/md"]
    environment:
      # Development default only. Set TC_ADMIN_TOKEN to a secret in production.
      TC_ADMIN_TOKEN: ${TC_ADMIN_TOKEN:-local-admin-token}
      # Demo trading-terminal credential; replace with user authentication.
      TC_TRADING_TOKEN: ${TC_TRADING_TOKEN:-local-trading-token}
      TC_ORDER_API_ADDR: order:9200
      TC_ORDER_API_TOKEN: ${TC_ORDER_API_TOKEN:-local-order-api-token}
      TC_ORDER_API_MAX_IDLE_CONNECTIONS: ${TC_ORDER_API_MAX_IDLE_CONNECTIONS:-32}
      TC_LOG: ${TC_LOG:-info}
      RUST_BACKTRACE: ${RUST_BACKTRACE:-1}
    depends_on:
      # raft-* live in docker-compose.raft.yml and define no healthcheck, so
      # they stay service_started; order exposes one and gates the UI proxy.
      order:
        condition: service_healthy
      raft-1:
        condition: service_started
      raft-2:
        condition: service_started
      raft-3:
        condition: service_started
      raft-4:
        condition: service_started
      raft-5:
        condition: service_started
    ports:
      - "8081:8080"   # chart UI + JSON API + WebSocket (8080 is in use locally)
    volumes:
      - market-data-history:/data/md
    healthcheck:
      # debian:stable-slim ships no curl/wget; bash /dev/tcp probes the HTTP port.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080 && exec 3>&- 3<&-"]
      interval: 5s
      timeout: 3s
      retries: 40
      start_period: 20s
    restart: unless-stopped

  mysql-order-0:
    image: mysql:8.4
    command: *mysql-command
    environment: { MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-local-root-password}" }
    volumes: ["order-mysql-0:/var/lib/mysql"]
    healthcheck: { test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"], interval: 3s, timeout: 3s, retries: 40, start_period: 10s }
    restart: unless-stopped
  mysql-order-1:
    image: mysql:8.4
    command: *mysql-command
    environment: { MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-local-root-password}" }
    volumes: ["order-mysql-1:/var/lib/mysql"]
    healthcheck: { test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"], interval: 3s, timeout: 3s, retries: 40, start_period: 10s }
    restart: unless-stopped
  mysql-order-2:
    image: mysql:8.4
    command: *mysql-command
    environment: { MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-local-root-password}" }
    volumes: ["order-mysql-2:/var/lib/mysql"]
    healthcheck: { test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"], interval: 3s, timeout: 3s, retries: 40, start_period: 10s }
    restart: unless-stopped
  mysql-order-3:
    image: mysql:8.4
    command: *mysql-command
    environment: { MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-local-root-password}" }
    volumes: ["order-mysql-3:/var/lib/mysql"]
    healthcheck: { test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"], interval: 3s, timeout: 3s, retries: 40, start_period: 10s }
    restart: unless-stopped
  mysql-order-4:
    image: mysql:8.4
    command: *mysql-command
    environment: { MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-local-root-password}" }
    volumes: ["order-mysql-4:/var/lib/mysql"]
    healthcheck: { test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"], interval: 3s, timeout: 3s, retries: 40, start_period: 10s }
    restart: unless-stopped
  mysql-order-5:
    image: mysql:8.4
    command: *mysql-command
    environment: { MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-local-root-password}" }
    volumes: ["order-mysql-5:/var/lib/mysql"]
    healthcheck: { test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"], interval: 3s, timeout: 3s, retries: 40, start_period: 10s }
    restart: unless-stopped
  mysql-order-6:
    image: mysql:8.4
    command: *mysql-command
    environment: { MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-local-root-password}" }
    volumes: ["order-mysql-6:/var/lib/mysql"]
    healthcheck: { test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"], interval: 3s, timeout: 3s, retries: 40, start_period: 10s }
    restart: unless-stopped
  mysql-order-7:
    image: mysql:8.4
    command: *mysql-command
    environment: { MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-local-root-password}" }
    volumes: ["order-mysql-7:/var/lib/mysql"]
    healthcheck: { test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"], interval: 3s, timeout: 3s, retries: 40, start_period: 10s }
    restart: unless-stopped
  mysql-order-8:
    image: mysql:8.4
    command: *mysql-command
    environment: { MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-local-root-password}" }
    volumes: ["order-mysql-8:/var/lib/mysql"]
    healthcheck: { test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"], interval: 3s, timeout: 3s, retries: 40, start_period: 10s }
    restart: unless-stopped
  mysql-order-9:
    image: mysql:8.4
    command: *mysql-command
    environment: { MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-local-root-password}" }
    volumes: ["order-mysql-9:/var/lib/mysql"]
    healthcheck: { test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"], interval: 3s, timeout: 3s, retries: 40, start_period: 10s }
    restart: unless-stopped

  order:
    build: .
    image: trade-core-node
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      mysql-order-0:
        condition: service_healthy
      mysql-order-1:
        condition: service_healthy
      mysql-order-2:
        condition: service_healthy
      mysql-order-3:
        condition: service_healthy
      mysql-order-4:
        condition: service_healthy
      mysql-order-5:
        condition: service_healthy
      mysql-order-6:
        condition: service_healthy
      mysql-order-7:
        condition: service_healthy
      mysql-order-8:
        condition: service_healthy
      mysql-order-9:
        condition: service_healthy
    command: ["exec order-api"]
    environment:
      TC_LOG: ${TC_LOG:-info}
      RUST_BACKTRACE: ${RUST_BACKTRACE:-1}
      TC_SLOW_FSYNC_WARN_MS: ${TC_SLOW_FSYNC_WARN_MS:-50}
      TC_ORDER_MYSQL_SHARD_URLS: ${TC_ORDER_MYSQL_SHARD_URLS:-mysql://root:${MYSQL_ROOT_PASSWORD:-local-root-password}@mysql-order-0:3306/mysql,mysql://root:${MYSQL_ROOT_PASSWORD:-local-root-password}@mysql-order-1:3306/mysql,mysql://root:${MYSQL_ROOT_PASSWORD:-local-root-password}@mysql-order-2:3306/mysql,mysql://root:${MYSQL_ROOT_PASSWORD:-local-root-password}@mysql-order-3:3306/mysql,mysql://root:${MYSQL_ROOT_PASSWORD:-local-root-password}@mysql-order-4:3306/mysql,mysql://root:${MYSQL_ROOT_PASSWORD:-local-root-password}@mysql-order-5:3306/mysql,mysql://root:${MYSQL_ROOT_PASSWORD:-local-root-password}@mysql-order-6:3306/mysql,mysql://root:${MYSQL_ROOT_PASSWORD:-local-root-password}@mysql-order-7:3306/mysql,mysql://root:${MYSQL_ROOT_PASSWORD:-local-root-password}@mysql-order-8:3306/mysql,mysql://root:${MYSQL_ROOT_PASSWORD:-local-root-password}@mysql-order-9:3306/mysql}
      TC_DB_COUNT: ${TC_DB_COUNT:-10}
      TC_TABLES_PER_DB: ${TC_TABLES_PER_DB:-100}
      TC_SHARD_ROUTE_VERSION: ${TC_SHARD_ROUTE_VERSION:-1}
      TC_RAFT_GROUP_MATCHERS: "${TC_RAFT_GROUP_MATCHERS:-raft-1:9001@raft-1:9102,raft-2:9001@raft-2:9102,raft-3:9001@raft-3:9102,raft-4:9001@raft-4:9102,raft-5:9001@raft-5:9102;raft-1:9011@raft-1:9112,raft-2:9011@raft-2:9112,raft-3:9011@raft-3:9112,raft-4:9011@raft-4:9112,raft-5:9011@raft-5:9112;raft-1:9021@raft-1:9122,raft-2:9021@raft-2:9122,raft-3:9021@raft-3:9122,raft-4:9021@raft-4:9122,raft-5:9021@raft-5:9122;raft-1:9031@raft-1:9132,raft-2:9031@raft-2:9132,raft-3:9031@raft-3:9132,raft-4:9031@raft-4:9132,raft-5:9031@raft-5:9132}"
      TC_ORDER_API_TOKEN: ${TC_ORDER_API_TOKEN:-local-order-api-token}
      TC_ORDER_CATEGORY_SIZE: ${TC_ORDER_CATEGORY_SIZE:-1000}
      TC_ORDER_KAFKA_BROKERS: ${TC_ORDER_KAFKA_BROKERS:-redpanda:9092,redpanda-2:9092,redpanda-3:9092}
      TC_ORDER_KAFKA_TOPIC_PREFIX: ${TC_ORDER_KAFKA_TOPIC_PREFIX:-orders-v2-g}
      # Raise to 16+ on production-sized Kafka brokers.
      TC_ORDER_KAFKA_TOPIC_COUNT: ${TC_ORDER_KAFKA_TOPIC_COUNT:-4}
      # Laptop-safe default. Production capacity tests override this to 64+.
      TC_ORDER_KAFKA_PARTITIONS_PER_TOPIC: ${TC_ORDER_KAFKA_PARTITIONS_PER_TOPIC:-8}
      # One consumer per physical partition keeps independent offset/retry pipelines.
      TC_ORDER_KAFKA_CONSUMERS: ${TC_ORDER_KAFKA_CONSUMERS:-32}
      TC_ORDER_KAFKA_DB_CONSUMERS: ${TC_ORDER_KAFKA_DB_CONSUMERS:-32}
      # More submitters than ordered Raft groups cause contention and leader
      # retries. Scale this with TC_RAFT_GROUPS, not with Kafka partitions.
      TC_ORDER_KAFKA_MATCH_CONSUMERS: ${TC_ORDER_KAFKA_MATCH_CONSUMERS:-4}
      TC_ORDER_KAFKA_DB_GROUP: ${TC_ORDER_KAFKA_DB_GROUP:-trade-order-persist-v1}
      TC_ORDER_KAFKA_MATCH_GROUP: ${TC_ORDER_KAFKA_MATCH_GROUP:-trade-order-match-v1}
      TC_EXECUTION_KAFKA_TOPIC: ${TC_EXECUTION_KAFKA_TOPIC:-trade-executions-v1}
      TC_EXECUTION_KAFKA_MYSQL_GROUP: ${TC_EXECUTION_KAFKA_MYSQL_GROUP:-trade-order-execution-mysql-v1}
      TC_EXECUTION_KAFKA_MYSQL_CONSUMERS: ${TC_EXECUTION_KAFKA_MYSQL_CONSUMERS:-4}
      # Example: "12:4,99:5" pins hot categories to dedicated Raft groups.
      TC_RAFT_CATEGORY_PINS: ${TC_RAFT_CATEGORY_PINS:-}
      TC_RAFT_LEADER_PROBE_TIMEOUT_MS: ${TC_RAFT_LEADER_PROBE_TIMEOUT_MS:-1000}
      TC_RAFT_MATCHER_IO_TIMEOUT_MS: ${TC_RAFT_MATCHER_IO_TIMEOUT_MS:-5000}
      TC_RAFT_FORWARD_QUEUE: ${TC_RAFT_FORWARD_QUEUE:-64}
      TC_ORDER_KAFKA_ROUTE_VERSION: ${TC_ORDER_KAFKA_ROUTE_VERSION:-1}
      TC_ORDER_KAFKA_LINGER_MS: ${TC_ORDER_KAFKA_LINGER_MS:-1}
      TC_ORDER_KAFKA_BATCH_MESSAGES: ${TC_ORDER_KAFKA_BATCH_MESSAGES:-10000}
      TC_ORDER_KAFKA_COMPRESSION: ${TC_ORDER_KAFKA_COMPRESSION:-lz4}
      TC_ORDER_KAFKA_QUEUE_KBYTES: ${TC_ORDER_KAFKA_QUEUE_KBYTES:-1048576}
      TC_KAFKA_FETCH_MIN_BYTES: ${TC_KAFKA_FETCH_MIN_BYTES:-1}
      TC_KAFKA_FETCH_WAIT_MS: ${TC_KAFKA_FETCH_WAIT_MS:-10}
      TC_KAFKA_FETCH_MAX_BYTES: ${TC_KAFKA_FETCH_MAX_BYTES:-52428800}
      TC_ORDER_BATCH_SIZE: ${TC_ORDER_BATCH_SIZE:-1000}
      TC_ORDER_BATCH_LINGER_MS: ${TC_ORDER_BATCH_LINGER_MS:-2}
      # Hard bound for commands accepted by Kafka but not completed by both
      # MySQL and matching. Production sets this to roughly two seconds of
      # designed traffic and clients retry HTTP 429 with jitter.
      # Bound Kafka fanout pressure to fit the default 8 GiB Docker Desktop VM.
      # Production sets this from measured bytes/command and node memory.
      TC_ORDER_MAX_PIPELINE_BACKLOG: ${TC_ORDER_MAX_PIPELINE_BACKLOG:-50000}
    ports:
      - "9200:9200"
    healthcheck:
      # :9200 serves /metrics; a TCP connect via bash /dev/tcp is enough to
      # gate dependents (debian:stable-slim has no curl/wget).
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/9200 && exec 3>&- 3<&-"]
      interval: 5s
      timeout: 3s
      retries: 40
      start_period: 30s
    restart: unless-stopped

volumes:
  redpanda-data:
  redpanda-2-data:
  redpanda-3-data:
  market-data-history:
  order-mysql-0:
  order-mysql-1:
  order-mysql-2:
  order-mysql-3:
  order-mysql-4:
  order-mysql-5:
  order-mysql-6:
  order-mysql-7:
  order-mysql-8:
  order-mysql-9:
